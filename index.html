<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node.js Study Projects</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 720px;
      width: 100%;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #1a1a2e;
      font-size: 2rem;
      margin-bottom: 40px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .card h2 {
      font-size: 1.4rem;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    .card p {
      color: #666;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .card .arrow {
      display: inline-block;
      margin-top: 16px;
      color: #4361ee;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Node.js Study Projects</h1>
    <div class="cards">
      <a href="/BizchoolPlatform" class="card">
        <h2>Bizchool Platform</h2>
        <p>게시판 CRUD 및 회원 관리 플랫폼</p>
        <span class="arrow">바로가기 &rarr;</span>
      </a>
      <a href="/OpenApp" class="card">
        <h2>Open App</h2>
        <p>Opentutorials 학습 및 게시판 CRUD 앱</p>
        <span class="arrow">바로가기 &rarr;</span>
      </a>
    </div>
  </div>
</body>
</html>
