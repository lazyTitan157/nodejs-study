<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduCurate</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#5B7B6A;--pl:#7A9E8A;--pd:#3D5A4A;--pbg:#EDF3EF;--a:#D4916E;--al:#E8B89A;--as:#F5DFD0;--abg:#FFF6F0;--bg:#FAFAF7;--bgw:#F5F2ED;--bgc:#FFF;--t:#2C2C2C;--ts:#6B6B6B;--tl:#9B9B9B;--b:#E8E4DE;--bl:#F0ECE6;--pp:#7B6BA0;--ppbg:#F0EBF5;--star:#E8B44D;--red:#E05252;--sh:0 1px 3px rgba(0,0,0,.04);--shm:0 4px 12px rgba(0,0,0,.06);--shl:0 12px 32px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);line-height:1.7;-webkit-font-smoothing:antialiased}a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bl);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:'Noto Serif KR',serif;font-weight:700;font-size:17px;color:var(--pd)}.nav-logo i{width:30px;height:30px;background:var(--p);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-style:normal}

.nav-c{display:flex;align-items:center;gap:2px}.nav-c a{padding:5px 12px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--ts);transition:.2s}.nav-c a:hover{background:var(--bgw)}.nav-c a.on{background:var(--p);color:#fff}
.nav-r{display:flex;align-items:center;gap:8px}.nav-sr{width:32px;height:32px;border-radius:50%;background:var(--bgw);border:none;display:flex;align-items:center;justify-content:center;font-size:15px}.nav-sr:hover{background:var(--bl)}
.nav-bell{position:relative}.bell-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid #fff}
.nav-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent}.nav-av:hover{border-color:var(--pl)}
.notif-dd{position:absolute;top:44px;right:-40px;width:320px;background:#fff;border-radius:16px;box-shadow:var(--shl);border:1px solid var(--bl);display:none;z-index:300;max-height:360px;overflow-y:auto}.notif-dd.show{display:block}.notif-dd h4{padding:12px 16px;font-size:13px;font-weight:600;border-bottom:1px solid var(--bl);position:sticky;top:0;background:#fff;z-index:1}
.ni{display:flex;gap:9px;padding:10px 16px;border-bottom:1px solid var(--bl);cursor:pointer;transition:.15s;font-size:12px;color:var(--ts)}.ni:hover{background:var(--bgw)}.ni b{color:var(--t)}.ni .nt{font-size:10.5px;color:var(--tl);margin-top:1px}
.search-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:250;display:none;align-items:flex-start;justify-content:center;padding-top:80px}.search-ov.show{display:flex}.search-box{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:var(--shl);overflow:hidden}.search-box input{width:100%;padding:16px 20px;border:none;font-size:15px;font-family:inherit;outline:none}.search-results{max-height:400px;overflow-y:auto;border-top:1px solid var(--bl)}.sr-item{display:flex;gap:10px;padding:12px 20px;cursor:pointer;align-items:center}.sr-item:hover{background:var(--bgw)}.sr-item .sr-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.sr-item .sr-t{font-size:13px;font-weight:500}.sr-item .sr-m{font-size:11.5px;color:var(--tl)}
.pg{padding:70px 24px 50px;max-width:1080px;margin:0 auto;display:none}.pg.on{display:block}
.pg-h{margin-bottom:22px}.pg-h h1{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;color:var(--pd);margin-bottom:3px}.pg-h p{font-size:13px;color:var(--ts)}
.cd{background:var(--bgc);border:1px solid var(--bl);border-radius:16px;padding:18px;box-shadow:var(--sh);transition:.2s}.cd:hover{box-shadow:var(--shm)}
.tg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:500;background:var(--bgw);color:var(--ts)}.tg-g{background:var(--pbg);color:var(--pd)}.tg-o{background:var(--abg);color:var(--a)}.tg-p{background:var(--ppbg);color:var(--pp)}.tg-map{background:#FFF8E1;color:#9E8530}
.bt{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid transparent;transition:.2s}.bt-p{background:var(--p);color:#fff;border-color:var(--p)}.bt-p:hover{background:var(--pd)}.bt-o{background:var(--bgw);color:var(--ts);border-color:var(--b)}.bt-o:hover{background:#EDE9E2}.bt-s{padding:5px 10px;font-size:11px}.bt.on{background:var(--p);color:#fff;border-color:var(--p)}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--p);color:#fff}
/* Teacher levels */
.lv{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px}
.lv-seed{background:#E8F5E9;color:#4CAF50}.lv-grow{background:#E3F2FD;color:#2196F3}.lv-vet{background:#FFF3E0;color:#FF9800}.lv-star{background:var(--pbg);color:var(--p)}
/* Reactions */
.reactions{display:flex;gap:4px;border-top:1px solid var(--bl)}.reactions button{flex:1;padding:8px;background:none;border:none;font-size:11.5px;color:var(--ts);font-weight:500;display:flex;align-items:center;justify-content:center;gap:3px;transition:.15s;border-right:1px solid var(--bl)}.reactions button:last-child{border-right:none}.reactions button:hover{background:var(--bgw)}.reactions button.on{font-weight:700}
.reactions button.r1.on{color:var(--red)}.reactions button.r2.on{color:var(--pp)}.reactions button.r3.on{color:var(--p)}
/* Trending bar */

.hero{background:linear-gradient(135deg,var(--pd),var(--p));color:#fff;border-radius:20px;padding:22px 26px;margin-bottom:14px}.hero h2{font-family:'Noto Serif KR',serif;font-size:19px;margin-bottom:4px}.hero p{font-size:13px;opacity:.9}
.hero-st{display:flex;gap:10px;margin-top:12px}.hero-s{background:rgba(255,255,255,.15);border-radius:8px;padding:9px 12px;flex:1;text-align:center}.hero-s b{font-size:17px;display:block}.hero-s span{font-size:10.5px;opacity:.8}
.g2{display:grid;grid-template-columns:1fr 280px;gap:18px}.g-ar{display:grid;grid-template-columns:210px 1fr;gap:18px}
.f-sb{position:sticky;top:70px}.f-grp{margin-bottom:14px}.f-grp h3{font-size:11px;font-weight:600;color:var(--tl);letter-spacing:.4px;margin-bottom:6px;text-transform:uppercase}
.f-i{padding:5px 10px;border-radius:8px;font-size:11.5px;color:var(--ts);cursor:pointer;transition:.15s;margin-bottom:1px}.f-i:hover{background:var(--bgw)}.f-i.on{background:var(--p);color:#fff;font-weight:500}.f-i.accent{color:var(--a)}
.rc{display:flex;gap:12px;padding:14px;background:var(--bgc);border:1px solid var(--bl);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.2s;box-shadow:var(--sh)}.rc:hover{box-shadow:var(--shm);transform:translateY(-1px)}
.rc-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}.rc-bd{flex:1;min-width:0}.rc-bd h4{font-size:13px;font-weight:600;margin-bottom:2px}.rc-bd .meta{font-size:11px;color:var(--tl);margin-bottom:5px}.rc-bd .tags{display:flex;gap:4px;flex-wrap:wrap}.rc-st{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:2px;flex-shrink:0;font-size:11px;color:var(--tl)}.rc-st b{color:var(--ts)}
.det-back{font-size:12px;color:var(--tl);cursor:pointer;margin-bottom:12px;display:inline-block}.det-back:hover{color:var(--p)}
.det-hd{background:var(--bgc);border:1px solid var(--bl);border-radius:16px;padding:22px;margin-bottom:16px;box-shadow:var(--sh)}.det-hd h1{font-size:18px;font-weight:700;margin-bottom:3px}.det-hd .dmeta{font-size:12.5px;color:var(--ts);margin-bottom:8px}.det-hd .desc{font-size:13px;color:var(--ts);line-height:1.8;padding:14px;background:var(--bg);border-radius:8px;margin:10px 0}
.det-hd .filebox{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bgw);border-radius:8px;margin:10px 0}.det-hd .filebox .fic{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.det-acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}.det-acts button{display:flex;align-items:center;gap:4px}
.cmt-sec{background:var(--bgc);border:1px solid var(--bl);border-radius:16px;padding:18px;box-shadow:var(--sh)}.cmt-sec h3{font-size:14px;font-weight:600;margin-bottom:12px}
.cmt{display:flex;gap:9px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--bl)}.cmt:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.cmt .cb{flex:1}.cmt .cb .cn{font-size:12px;font-weight:600}.cmt .cb .ct{font-size:10.5px;color:var(--tl);margin-left:5px}.cmt .cb .cx{font-size:12.5px;color:var(--ts);margin-top:2px;line-height:1.7}
.cmt .cb .cr{margin-top:4px;display:flex;gap:10px;font-size:11px;color:var(--tl)}.cmt .cb .cr span{cursor:pointer}.cmt .cb .cr span:hover{color:var(--p)}.cmt .cb .cr span.liked-c{color:var(--red)}
.cmt-inp{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bl)}.cmt-inp input{flex:1;padding:8px 12px;border:1.5px solid var(--b);border-radius:16px;font-size:12px;font-family:inherit}.cmt-inp input:focus{outline:none;border-color:var(--p)}.cmt-inp button{padding:8px 16px;background:var(--p);color:#fff;border:none;border-radius:16px;font-size:12px;font-weight:600}
/* Professional review */
.rv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.rv-cd{background:var(--bgc);border:1px solid var(--bl);border-radius:16px;overflow:hidden;cursor:pointer;transition:.2s;box-shadow:var(--sh)}.rv-cd:hover{box-shadow:var(--shl);transform:translateY(-2px)}
.rv-img{height:120px;background:var(--bgw);display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.rvd-top{display:flex;gap:22px;padding:22px}.rvd-img{width:160px;height:160px;background:var(--bgw);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:52px;flex-shrink:0}
.rvd-info{flex:1}.rvd-info h1{font-size:20px;font-weight:700;margin-bottom:2px}.rvd-info .mk{font-size:13px;color:var(--ts);margin-bottom:8px}
.sc-big{display:flex;align-items:baseline;gap:6px;margin-bottom:12px}.sc-big .n{font-size:32px;font-weight:700;color:var(--pd)}.sc-big .o{font-size:14px;color:var(--tl)}.sc-big .s{color:var(--star);font-size:16px}
.sc-bars{display:grid;grid-template-columns:1fr 1fr;gap:7px}.sc-bar{display:flex;align-items:center;gap:7px}.sc-bar .lb{font-size:11.5px;color:var(--ts);width:90px;flex-shrink:0}.sc-bar .bar{flex:1;height:6px;background:var(--bl);border-radius:3px;overflow:hidden}.sc-bar .bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--pl),var(--p))}.sc-bar .vl{font-size:12px;font-weight:700;color:var(--pd);width:26px;text-align:right}
/* Pro eval card */
.pev{background:var(--bgc);border:1px solid var(--bl);border-radius:16px;padding:0;margin-bottom:14px;box-shadow:var(--sh);overflow:hidden}
.pev-hd{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--bl);background:var(--bg)}
.pev-hd .nm{font-size:13.5px;font-weight:600}.pev-hd .mt{font-size:11px;color:var(--tl)}
.pev-spec{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 20px;border-bottom:1px solid var(--bl);background:var(--bgw)}
.pev-spec .sp-item{text-align:center}.pev-spec .sp-item .sp-v{font-size:14px;font-weight:700;color:var(--pd)}.pev-spec .sp-item .sp-l{font-size:10px;color:var(--tl)}
.pev-scores{display:flex;gap:6px;padding:14px 20px;border-bottom:1px solid var(--bl);flex-wrap:wrap}
.pev-scores span{padding:3px 10px;border-radius:8px;font-size:11px;font-weight:500;background:var(--bgw)}
.pev-body{padding:16px 20px}
.pev-section{margin-bottom:14px}.pev-section h4{font-size:12.5px;font-weight:600;color:var(--pd);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.pev-list{list-style:none;padding:0}.pev-list li{font-size:12.5px;color:var(--ts);line-height:1.7;padding:4px 0;padding-left:20px;position:relative}.pev-list li::before{content:'';position:absolute;left:6px;top:11px;width:6px;height:6px;border-radius:50%}
.pev-list.pros li::before{background:#4CAF50}.pev-list.cons li::before{background:var(--a)}
.pev-timeline{border-left:2px solid var(--pl);padding-left:16px;margin-left:8px}
.pev-timeline .tl-item{margin-bottom:10px;position:relative}.pev-timeline .tl-item::before{content:'';position:absolute;left:-21px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--p);border:2px solid #fff}
.pev-timeline .tl-item .tl-t{font-size:11px;font-weight:600;color:var(--p)}.pev-timeline .tl-item .tl-d{font-size:12px;color:var(--ts)}
.pev-recommend{padding:12px 20px;background:var(--pbg);border-top:1px solid var(--bl);font-size:12px;color:var(--pd)}
/* Feed */
.fp{background:var(--bgc);border:1px solid var(--bl);border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:var(--sh)}
.fp-hd{display:flex;align-items:center;gap:9px;padding:12px 15px}.fp-hd .nm{font-size:13px;font-weight:600}.fp-hd .mt{font-size:11px;color:var(--tl)}
.fp-bd{padding:0 15px 11px;cursor:pointer}.fp-bd .tt{font-size:13.5px;font-weight:600;margin-bottom:4px}.fp-bd .dx{font-size:12.5px;color:var(--ts);line-height:1.7}
.fp-tg{padding:0 15px 8px;display:flex;gap:4px;flex-wrap:wrap}
.fp-preview{margin:0 15px 10px;padding:12px;background:var(--bgw);border-radius:10px;display:flex;align-items:center;gap:10px}
.fp-preview .pv-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.fp-preview .pv-info{font-size:12px}.fp-preview .pv-info b{font-weight:600;display:block;margin-bottom:1px}.fp-preview .pv-info span{color:var(--tl);font-size:11px}
/* Community */
.cp{background:var(--bgc);border:1px solid var(--bl);border-radius:12px;padding:16px;margin-bottom:8px;cursor:pointer;transition:.15s;box-shadow:var(--sh)}.cp:hover{box-shadow:var(--shm)}
.cp-cat{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10.5px;font-weight:600;margin-bottom:6px}
.cat-qna{background:var(--pbg);color:var(--p)}.cat-discuss{background:var(--ppbg);color:var(--pp)}.cat-news{background:var(--abg);color:var(--a)}.cat-free{background:var(--bgw);color:var(--ts)}
.cp h4{font-size:13.5px;font-weight:600;margin-bottom:3px}.cp .dx{font-size:12.5px;color:var(--ts);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.cp-ft{display:flex;gap:12px;margin-top:8px;font-size:11.5px;color:var(--tl)}
/* My page */
.my-hd{display:flex;gap:22px;align-items:center;padding:22px;background:var(--bgc);border-radius:20px;border:1px solid var(--bl);margin-bottom:18px;box-shadow:var(--sh)}
.my-av-wrap{position:relative;cursor:pointer}.my-av-wrap:hover .av-edit{opacity:1}
.my-av{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:700;flex-shrink:0}
.av-edit{position:absolute;bottom:0;right:0;width:24px;height:24px;border-radius:50%;background:var(--p);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;opacity:0;transition:.2s}
.my-inf{flex:1}.my-inf h2{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;margin-bottom:1px}.my-inf .sub{font-size:12.5px;color:var(--ts);margin-bottom:7px}
.my-sts{display:flex;gap:16px}.my-sts div{text-align:center}.my-sts div b{display:block;font-size:16px}.my-sts div span{font-size:10.5px;color:var(--tl)}
.my-tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:2px solid var(--bl)}.my-tab{padding:8px 14px;font-size:12.5px;font-weight:500;color:var(--tl);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}.my-tab.on{color:var(--pd);border-bottom-color:var(--p);font-weight:600}
.my-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.my-cd{background:var(--bgc);border:1px solid var(--bl);border-radius:12px;padding:14px;position:relative;cursor:pointer;transition:.2s}.my-cd:hover{box-shadow:var(--shm)}.my-cd .tp{font-size:20px;margin-bottom:5px}.my-cd h4{font-size:13px;font-weight:600;margin-bottom:2px}.my-cd .mt{font-size:11px;color:var(--tl)}.my-cd .vis{position:absolute;top:9px;right:9px;font-size:10px;padding:2px 6px;border-radius:6px}.vis-pub{background:var(--pbg);color:var(--p)}.vis-pri{background:var(--bgw);color:var(--tl)}
.act-item{display:flex;gap:10px;padding:10px 12px;border-radius:8px;background:var(--bg);margin-bottom:6px;font-size:12px;color:var(--ts);align-items:center}
.act-item .ai-ic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}.act-item .ai-t{font-size:10.5px;color:var(--tl);margin-top:1px}
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}.modal-ov.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:26px;width:100%;max-width:440px;max-height:80vh;overflow-y:auto;box-shadow:var(--shl)}
.modal h2{font-family:'Noto Serif KR',serif;font-size:17px;margin-bottom:2px}.modal .ms{font-size:12px;color:var(--ts);margin-bottom:16px}
.fg{margin-bottom:12px}.fg label{display:block;font-size:11.5px;font-weight:500;color:var(--ts);margin-bottom:3px}.fg input,.fg select,.fg textarea{width:100%;padding:8px 12px;border:1.5px solid var(--b);border-radius:8px;font-size:12.5px;font-family:inherit;background:#fff}.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--p)}.fg textarea{resize:vertical;min-height:60px}
.cb-grid{display:flex;flex-wrap:wrap;gap:5px}.cb-i{padding:4px 10px;border-radius:8px;border:1.5px solid var(--b);font-size:11.5px;cursor:pointer;transition:.2s;background:#fff}.cb-i:hover{border-color:var(--pl)}.cb-i.ck{background:var(--pbg);border-color:var(--p);color:var(--pd);font-weight:500}

function rArchive(){const pub=PUB[S.pub];let f=R.slice();if(S.unit>=0&&S.unit<100)f=f.filter(r=>r.tp===S.unit);else if(S.unit>=100)f=f.filter(r=>r.sp===SCAT[S.unit-100]);if(S.rtype!=='전체')f=f.filter(r=>r.ty===S.rtype);if(S.rsort==='date')f.sort((a,b)=>b.dt>a.dt?1:-1);else if(S.rsort==='dl')f.sort((a,b)=>b.dl-a.dl);else f.sort((a,b)=>b.lk-a.lk);

${f.length===0?'<div class="empty">해당 조건의 자료가 없습니다.</div>':''}
${f.map(r=>{const tc=TC[r.ty]||['var(--bgw)','var(--ts)'];const tn=r.tp>=0?TOP[r.tp]:(r.sp||'');const sp=PUB.find(p=>p.id===r.pb);const mp=r.pb!==PUB[S.pub].id&&r.tp>=0;
